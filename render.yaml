services:
  - type: web
    name: automated-project-evaluation-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: API_KEY_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: '^https://[a-z0-9-]+\.vercel\.app$'
      - key: STORAGE_ROOT
        value: /app/uploads
      - key: SEED_DEMO_USER
        value: "false"
      - key: DATABASE_POOL_RECYCLE_SECONDS
        value: "300"
      - key: BATCH_MAX_PARALLEL_EVALUATIONS
        value: "2"
      - key: BATCH_MAX_PARALLEL_EVALUATIONS_GROQ
        value: "1"
      - key: BATCH_RATE_LIMIT_RETRY_ATTEMPTS
        value: "3"
      - key: BATCH_RATE_LIMIT_RETRY_BASE_SECONDS
        value: "2"
